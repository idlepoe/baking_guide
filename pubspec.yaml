name: baking_guide
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.11.5
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.7.3
  flex_color_scheme: ^8.4.0
  flex_seed_scheme: ^4.0.1
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  shared_preferences: ^2.5.5
  wakelock_plus: 1.6.1
  uuid: 4.5.1
  android_alarm_manager_plus: 5.0.0
  flutter_local_notifications: 21.0.0
  timezone: ^0.11.0
  permission_handler: ^11.4.0
  flutter_launcher_icons: ^0.14.4
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.5
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/icons/icon.png
  windows:
    generate: true
    image_path: "assets/icons/icon.png"
    icon_size: 256
flutter:
  uses-material-design: true
  assets:
    - assets/json/recipe_list.json
    - assets/json/recipes/
    - assets/images/
    - assets/icons/
    - assets/images/calculator/

